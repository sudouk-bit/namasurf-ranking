<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>店舗ランキング｜須藤牧場 生シェイク祭り2026</title>
<style>
  :root {
    --green-dark: #1e5c32;
    --green-mid:  #2d7d46;
    --green-light:#4caf72;
    --gold:       #f4b942;
    --silver:     #9eaab5;
    --bronze:     #c87941;
    --bg:         #f5faf6;
    --card-bg:    #ffffff;
    --text:       #1a2e1f;
    --muted:      #6b8a72;
    --radius:     16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Kaku Gothic Pro','Yu Gothic UI','Meiryo',sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    color: white;
    text-align: center;
    padding: 48px 20px 56px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='20'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
    pointer-events: none;
  }
  .header-milk { font-size: 48px; margin-bottom: 8px; }
  header h1 { font-size: clamp(22px, 5vw, 36px); font-weight: 700; letter-spacing: 2px; line-height: 1.3; }
  header p.subtitle { margin-top: 10px; font-size: 15px; color: rgba(255,255,255,0.75); letter-spacing: 1px; }
  .updated-badge {
    display: inline-block;
    margin-top: 18px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 100px;
    padding: 6px 18px;
    font-size: 13px;
    color: rgba(255,255,255,0.9);
  }
  main { max-width: 760px; margin: -24px auto 60px; padding: 0 16px; }
  .podium { display: flex; gap: 12px; margin-bottom: 32px; align-items: flex-end; }
  .podium-item {
    flex: 1;
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 20px 12px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    position: relative;
    transition: transform .2s;
  }
  .podium-item:hover { transform: translateY(-4px); }
  .podium-item.rank-1 { order: 2; padding-top: 28px; box-shadow: 0 8px 32px rgba(244,185,66,0.25); border: 2px solid var(--gold); }
  .podium-item.rank-2 { order: 1; }
  .podium-item.rank-3 { order: 3; }
  .medal { font-size: 36px; display: block; margin-bottom: 8px; }
  .podium-item.rank-1 .medal::after { content: '🥇'; }
  .podium-item.rank-2 .medal::after { content: '🥈'; }
  .podium-item.rank-3 .medal::after { content: '🥉'; }
  .podium-name { font-size: 13px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; color: var(--text); }
  .podium-score-num { font-size: 28px; font-weight: 800; color: var(--green-mid); display: block; }
  .podium-score-label { font-size: 10px; color: var(--muted); }
  .podium-stars { font-size: 14px; margin: 6px 0 2px; color: var(--gold); letter-spacing: 1px; }
  .podium-reviews { font-size: 11px; color: var(--muted); }
  .ranking-list { display: flex; flex-direction: column; gap: 10px; }
  .ranking-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    transition: transform .18s, box-shadow .18s;
    animation: slideIn .4s ease both;
  }
  .ranking-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .rank-num { font-size: 22px; font-weight: 800; color: var(--muted); min-width: 36px; text-align: center; }
  .rank-num.top { color: var(--green-mid); }
  .card-info { flex: 1; }
  .card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .card-stars { color: var(--gold); font-size: 14px; letter-spacing: 1px; }
  .card-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .card-score { text-align: right; min-width: 64px; }
  .score-num { font-size: 24px; font-weight: 800; color: var(--green-mid); display: block; }
  .score-label { font-size: 10px; color: var(--muted); }
  .empty { text-align: center; padding: 80px 20px; color: var(--muted); }
  .empty p { font-size: 18px; margin-bottom: 8px; }
  .empty small { font-size: 13px; }
  footer { text-align: center; padding: 32px 20px; font-size: 12px; color: var(--muted); border-top: 1px solid #e8f0ea; }
  footer a { color: var(--green-mid); text-decoration: none; }
  .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 16px; }
  .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #d0e8d6; border-top-color: var(--green-mid); border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 500px) {
    .podium { gap: 8px; }
    .podium-name { font-size: 11px; }
    .podium-score-num { font-size: 22px; }
    header { padding: 36px 16px 48px; }
  }
</style>
</head>
<body>
<header>
  <div class="header-milk">🥛</div>
  <h1>須藤牧場 生シェイク祭り2026<br>店舗ランキング</h1>
  <p class="subtitle">お客様の声でつくる、今年のベストシェイク</p>
  <div class="updated-badge" id="updatedAt">読み込み中…</div>
</header>
<main>
  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      <p>ランキングを取得中…</p>
    </div>
  </div>
</main>
<footer>
  <p>© 株式会社須藤牧場 &nbsp;|&nbsp; <a href="https://www.sudo-farm.com/" target="_blank">sudo-farm.com</a></p>
  <p style="margin-top:6px">ランキングは毎日17時に自動更新されます。承認済みレビューの総合スコア（平均評価×件数）で算出。</p>
</footer>
<script>
const EMPTY_STARS = ['', '★☆☆☆☆', '★★☆☆☆', '★★★☆☆', '★★★★☆', '★★★★★'];
function starStr(avg) { const r = Math.round(avg); return EMPTY_STARS[Math.min(5,Math.max(1,r))] || '—'; }
function fmtScore(s) { return parseFloat(s).toFixed(1); }
function fmtAvg(a) { return parseFloat(a).toFixed(1); }
function renderPodium(top3) {
  return '<div class="podium">' + top3.map((s,i) =>
    '<div class="podium-item rank-'+(i+1)+'"><span class="medal"></span><div class="podium-name">'+s.name+'</div><div class="podium-stars">'+starStr(s.avg_rating)+'</div><span class="podium-score-num">'+fmtScore(s.total_score)+'</span><span class="podium-score-label">総合スコア</span><div class="podium-reviews">'+s.review_count+'件のレビュー / 平均 '+fmtAvg(s.avg_rating)+'点</div></div>'
  ).join('') + '</div>';
}
function renderList(shops) {
  return '<div class="ranking-list">' + shops.map((s,i) =>
    '<div class="ranking-card" style="animation-delay:'+(i*0.04)+'s"><div class="rank-num '+(i<3?'top':'')+'>'+(i+1)+'</div><div class="card-info"><div class="card-name">'+s.name+'</div><div class="card-stars">'+starStr(s.avg_rating)+'</div><div class="card-meta">レビュー '+s.review_count+'件 &nbsp;|&nbsp; 平均評価 '+fmtAvg(s.avg_rating)+'点</div></div><div class="card-score"><span class="score-num">'+fmtScore(s.total_score)+'</span><span class="score-label">スコア</span></div></div>'
  ).join('') + '</div>';
}
async function load() {
  const app = document.getElementById('app');
  const badge = document.getElementById('updatedAt');
  try {
    const res = await fetch('ranking.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    badge.textContent = '最終更新：' + (data.updated_at || '—');
    const shops = (data.shops || []).sort((a,b) => b.total_score - a.total_score);
    if (shops.length === 0) {
      app.innerHTML = '<div class="empty"><p>🥛</p><p>まだレビューがありません</p><small>レビューが承認されるとここに表示されます</small></div>';
      return;
    }
    const top3 = shops.slice(0, Math.min(3, shops.length));
    const rest = shops.slice(3);
    app.innerHTML = renderPodium(top3) + (rest.length ? renderList(rest) : '');
  } catch(e) {
    badge.textContent = 'データ取得中…';
    app.innerHTML = '<div class="empty"><p>🥛</p><p>データを読み込んでいます</p><small>しばらくしてからページを更新してください</small></div>';
  }
}
load();
setInterval(load, 600000);
</script>
</body>
</html>
