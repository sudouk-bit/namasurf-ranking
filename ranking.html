<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>レビューまと、｜須藤牧場 生シェイク祭り2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f8f7f5;
    --surface:  #ffffff;
    --text:     #1c1b1a;
    --muted:    #9a9590;
    --border:   #e5e2de;
    --accent:   #3a5a3a;
    --dim:      #d8d4cf;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic Pro', 'Yu Gothic UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 52px 24px 44px;
  }

  .header-inner {
    max-width: 720px;
    margin: 0 auto;
  }

  .header-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  header h1 {
    font-size: clamp(30px, 6vw, 46px);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .subtitle {
    font-size: 14px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    margin-top: 36px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .updated-at {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* ── Main ── */
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Loading ── */
  .loading {
    padding: 80px 0;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  /* ── Ranking List ── */
  .ranking-list {
    border-top: 1px solid var(--border);
  }

  .ranking-item {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    gap: 24px;
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .45s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Rank number ── */
  .rank-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--dim);
    text-align: right;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -1px;
  }

  .ranking-item.is-top .rank-num {
    color: var(--text);
  }

  /* ── Store info ── */
  .item-name {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
    line-height: 1.4;
  }

  .item-name a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
    padding-bottom: 1px;
  }

  .item-name a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .item-meta {
    font-size: 12px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  .item-rating {
    color: var(--accent);
    font-weight: 500;
  }

  /* ── Score ── */
  .item-score {
    text-align: right;
    min-width: 68px;
  }

  .score-val {
    font-size: 22px;
    font-weight: 700;
    display: block;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .score-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    font-weight: 400;
  }

  /* ── Empty ── */
  .empty {
    padding: 80px 0;
    text-align: center;
    color: var(--muted);
  }

  .empty p { font-size: 16px; margin-bottom: 8px; font-weight: 300; }
  .empty small { font-size: 13px; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 32px 24px;
    font-size: 12px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  footer a { color: var(--muted); text-decoration: none; transition: color .15s; }
  footer a:hover { color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    header { padding: 40px 20px 36px; }
    main { padding: 0 20px 60px; }
    .ranking-item { grid-template-columns: 44px 1fr auto; gap: 16px; padding: 22px 0; }
    .rank-num { font-size: 22px; }
    .item-name { font-size: 15px; }
    .score-val { font-size: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="header-label">Sudo Farm &nbsp;·&nbsp; 生シォイク祭り 2026</p>
    <h1>レビューまとめ</h1>
    <p class="subtitle">レビューの数や評価が全てなのか？</p>
    <div class="meta-row">
      <span class="updated-at" id="updatedAt">読み込み中…</span>
    </div>
  </div>
</header>

<main>
  <div id="app">
    <div class="loading">読み込み中…</div>
  </div>
</main>

<footer>
  <p>© 株式会社須藤牧場 &nbsp;·&nbsp; <a href="https://www.sudo-farm.com/" target="_blank">sudo-farm.com</a></p>
  <p style="margin-top:6px">ランキングは毎日17時に自動更新。承認済みレビューの総合スコア（平均評価 × 件数）で算出。</p>
</footer>

<script>
function fmtScore(s) { return parseFloat(s).toFixed(1); }
function fmtAvg(a)   { return parseFloat(a).toFixed(1); }

function normalizeName(name) {
  return name.replace(/[\s　]+/g, ' ').trim();
}

function buildStoreMap(storeInfo) {
  const map = {};
  (storeInfo.stores || []).forEach(s => {
    map[normalizeName(s.name)] = { img: s.img, url: s.url };
  });
  return map;
}

function lookupStore(storeMap, name) {
  return storeMap[normalizeName(name)] || {};
}

function nameLink(name, url) {
  if (url) return `<a href="${url}" target="_blank" rel="noopener">${name}</a>`;
  return name;
}

function renderList(shops, storeMap) {
  return `<div class="ranking-list">
    ${shops.map((s, i) => {
      const info = lookupStore(storeMap, s.name);
      const rankStr = String(i + 1).padStart(2, '0');
      return `
      <div class="ranking-item ${i < 3 ? 'is-top' : ''}" style="animation-delay:${i * 0.05}s">
        <div class="rank-num">${rankStr}</div>
        <div class="item-info">
          <div class="item-name">${nameLink(s.name, info.url)}</div>
          <div class="item-meta">
            <span class="item-rating">★ ${fmtAvg(s.avg_rating)}</span>
            &nbsp;·&nbsp; ${s.review_count}件のレビュー
          </div>
        </div>
        <div class="item-score">
          <span class="score-val">${fmtScore(s.total_score)}</span>
          <span class="score-label">SCORE</span>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function load() {
  const app = document.getElementById('app');
  const badge = document.getElementById('updatedAt');
  try {
    const t = Date.now();
    const [rankRes, infoRes] = await Promise.all([
      fetch('ranking.json?t=' + t),
      fetch('store-info.json?t=' + t)
    ]);
    if (!rankRes.ok) throw new Error('ranking fetch failed');

    const data = await rankRes.json();
    const storeInfo = infoRes.ok ? await infoRes.json() : { stores: [] };
    const storeMap = buildStoreMap(storeInfo);

    badge.textContent = '最終更新：' + (data.updated_at || '—');

    const shops = (data.shops || []).sort((a, b) => b.total_score - a.total_score);
    if (shops.length === 0) {
      app.innerHTML = `<div class="empty"><p>まだレビューがありません</p><small>レビューが承認されるとここに表示されます</small></div>`;
      return;
    }

    app.innerHTML = renderList(shops, storeMap);
  } catch (e) {
    badge.textContent = '—';
    app.innerHTML = `<div class="empty"><p>データを読み込んでいます</p><small>しばらくしてからページを更新してください</small></div>`;
  }
}

load();
setInterval(load, 600000);
</script>
</body>
</html>
